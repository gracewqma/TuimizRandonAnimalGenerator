<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="style.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=MV+Boli&display=swap" rel="stylesheet">
  <title>Random Animal Generator</title>
</head>
<body>
  <div class="container">
    <div class="title">Random Animal Generator</div>
    <div class="subtitle">~ by Tuimiz ~</div>

    <div class="button-container">
      <button data-category="base" onclick="generateWithAnimation(0)">Base</button>
      <span class="number" id="num0"></span>
      <span class="counter" id="count0"></span>
    </div>
    <div class="button-container">
      <button data-category="head" onclick="generateWithAnimation(1)">Head</button>
      <span class="number" id="num1"></span>
      <span class="counter" id="count1"></span>
    </div>
    <div class="button-container">
      <button data-category="ears" onclick="generateWithAnimation(2)">Ears</button>
      <span class="number" id="num2"></span>
      <span class="counter" id="count2"></span>
    </div>
    <div class="button-container">
      <button data-category="eyes" onclick="generateWithAnimation(3)">Eyes</button>
      <span class="number" id="num3"></span>
      <span class="counter" id="count3"></span>
    </div>
    <div class="button-container">
      <button data-category="nose" onclick="generateWithAnimation(4)">Nose</button>
      <span class="number" id="num4"></span>
      <span class="counter" id="count4"></span>
    </div>
    <div class="button-container">
      <button data-category="legs" onclick="generateWithAnimation(5)">Legs</button>
      <span class="number" id="num5"></span>
      <span class="counter" id="count5"></span>
    </div>
    <div class="button-container">
      <button data-category="feet" onclick="generateWithAnimation(6)">Feet</button>
      <span class="number" id="num6"></span>
      <span class="counter" id="count6"></span>
    </div>
    <div class="button-container">
      <button data-category="tail" onclick="generateWithAnimation(7)">Tail</button>
      <span class="number" id="num7"></span>
      <span class="counter" id="count7"></span>
    </div>
    <div class="button-container">
      <button data-category="coat" onclick="generateWithAnimation(8)">Coat</button>
      <span class="number" id="num8"></span>
      <span class="counter" id="count8"></span>
    </div>
    <div class="button-container">
      <button data-category="colour" onclick="generateWithAnimation(9)">Colour</button>
      <span class="number" id="num9"></span>
      <span class="counter" id="count9"></span>
    </div>
    <div class="button-container">
      <button data-category="extras" onclick="generateExtra()">Extra</button>
      <span class="number" id="num10"></span>
    </div>

    <div class="reset-container">
      <button id="resetBtn" onclick="resetAll()">🔄 Reset All</button>
    </div>

    <img src="heads.png" alt="Heads of Randomly Generated Creatures, by Tuimiz">
  </div>

  <!-- Arachnophobia Warning Overlay -->
  <div id="warningOverlay" class="warning-overlay" style="display:none;">
    <div class="warning-box">
      <p id="warningText" class="warning-text">WARNING: Arachnophobia generated</p>
      <button class="warning-close" onclick="closeWarning()">OK</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
